spring:
  application:
    name: plant-nursery

  # Настройки подключения к PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/plants_db
    username: postgres
    password: secret_password
    driver-class-name: org.postgresql.Driver

  # Настройки JPA / Hibernate
  jpa:
    # Отключаем автогенерацию таблиц от Hibernate, доверяем её Liquibase
    hibernate:
      ddl-auto: none
    # Показывать SQL запросы в консоли
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Путь к главному файлу миграций Liquibase
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  jwt:
    # Это сгенерированная безопасная строка (секрет), её длина критически важна для алгоритма HS256
    secret: dGhpcy1pcy1hLXNlY3VyZS1hbmQtbW9yZS10aGFuLTI1Ni1iaXQtbG9uZy1zZWNyZXQta2V5LWZvci1wbGFudC1udXJzZXJ5LXByb2plY3Q=
    # Время жизни токена в миллисекундах (в данном случае — 24 часа)
    expiration: 86400000

version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: plants-store-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: plants_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: